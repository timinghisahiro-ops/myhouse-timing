<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アクセス・道順 | MY HOUSE たいみんぐ</title>
  <meta name="description" content="桑名駅からMY HOUSE たいみんぐへの道順案内。徒歩3分。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0efed; --white: #ffffff; --gray-100: #f5f4f2; --gray-200: #e8e6e2;
      --gray-400: #c8c5bf; --gray-600: #8a8680; --gray-700: #5a5750; --gray-800: #2e2d2b;
      --accent: #7a6f5e; --accent-light: #b8a898;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--gray-800); overflow-x: hidden; }
    img { max-width: 100%; height: auto; display: block; }

    /* HEADER */
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 1rem 3rem; background: rgba(240,239,237,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid var(--gray-200); }
    .header-top { display: contents; }
    .header-sub { display: contents; }
    .header-sub .back-link, .header-sub .lang-switcher { margin-left: 0; }
    @media (min-width: 901px) {
      .header-sub { display: flex; align-items: center; gap: 1.5rem; }
    }
    .logo { display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
    .lang-switcher { display: flex; gap: 0.3rem; }
    .lang-btn { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; padding: 0.3rem 0.6rem; border: 1px solid var(--gray-400); background: transparent; color: var(--gray-600); cursor: pointer; transition: all 0.2s; }
    .lang-btn:hover { border-color: var(--gray-800); color: var(--gray-800); }
    .lang-btn.active { background: var(--gray-800); color: var(--white); border-color: var(--gray-800); }
    .back-link { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.12em; color: var(--gray-600); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
    .back-link:hover { color: var(--gray-800); }

    /* HERO */
    .access-hero { padding: 8rem 6rem 5rem; background: var(--gray-800); }
    .hero-eyebrow { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 1rem; display: block; }
    .hero-title { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; color: var(--white); line-height: 1.2; margin-bottom: 1rem; }
    .hero-title em { font-style: italic; color: var(--accent-light); }
    .hero-sub { font-size: 0.88rem; color: rgba(255,255,255,0.55); line-height: 1.9; }

    /* TABS */
    .tab-section { padding: 5rem 6rem; background: var(--white); }
    .section-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; display: block; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; margin-bottom: 2rem; }
    .section-title em { font-style: italic; color: var(--accent); }
    .tab-nav { display: flex; gap: 0; border-bottom: 2px solid var(--gray-200); margin-bottom: 3rem; }
    .tab-btn { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.8rem 2rem; border: none; background: transparent; color: var(--gray-600); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab-btn:hover { color: var(--gray-800); }
    .tab-btn.active { color: var(--gray-800); border-bottom-color: var(--gray-800); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* MAP */
    .map-wrap { width: 100%; border-radius: 2px; overflow: hidden; border: 1px solid var(--gray-200); }
    .map-wrap iframe { width: 100%; height: 400px; border: 0; display: block; }
    .map-info { display: flex; gap: 3rem; margin-top: 2rem; }
    .map-item { display: flex; align-items: center; gap: 0.8rem; }
    .map-icon { width: 40px; height: 40px; background: var(--gray-800); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .map-text { font-size: 0.85rem; line-height: 1.6; }
    .map-text strong { display: block; font-size: 0.7rem; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.2rem; }

    /* ROUTE GUIDE */
    .route-guide { display: flex; flex-direction: column; gap: 1.5rem; }
    .route-img { width: 100%; max-width: 720px; margin: 0 auto; display: block; border: 1px solid var(--gray-200); }

    /* PHOTOS GRID */
    .photos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
    .photo-item { position: relative; overflow: hidden; aspect-ratio: 4/3; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s; }
    .photo-item:hover img { transform: scale(1.04); }
    .photo-num { position: absolute; top: 0.8rem; left: 0.8rem; font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; background: var(--gray-800); color: rgba(255,255,255,0.8); padding: 0.2rem 0.6rem; }

    /* FOOTER */
    footer { background: var(--gray-800); padding: 2.5rem 6rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05); }
    .footer-info { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); text-align: right; line-height: 1.9; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      header {
        padding: 0;
        flex-direction: column;
        align-items: stretch;
      }
      .header-top {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.8rem 1rem;
        border-bottom: 1px solid var(--gray-200);
      }
      .header-sub {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.5rem 1rem;
      }
      .access-hero { padding: 8rem 1.5rem 3rem; }
      .hero-title { font-size: 2.2rem; }
      .tab-section { padding: 3rem 1.5rem; }
      .tab-btn { padding: 0.8rem 1rem; font-size: 0.6rem; }
      .map-info { flex-direction: column; gap: 1rem; }
      footer { flex-direction: column; gap: 1.5rem; text-align: center; padding: 2rem 1.5rem; }
      .footer-info { text-align: center; }
    }
    @media (max-width: 600px) {
      .photos-grid { grid-template-columns: 1fr; }
      .map-wrap iframe { height: 280px; }
      .route-img { width: 100%; height: auto; }
      .access-hero { padding: 9rem 1.2rem 2.5rem; }
      .tab-btn { padding: 0.7rem 0.8rem; font-size: 0.58rem; letter-spacing: 0.05em; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="MY HOUSE たいみんぐ" style="height:44px;width:auto;display:block;">
      <span style="font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:var(--gray-800);line-height:1.2;white-space:nowrap;">
        MY HOUSE たいみんぐ
        <small style="display:block;font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.15em;color:var(--accent);">Kuwana</small>
      </span>
    </a>
  </div>
  <div class="header-sub">
    <a href="index.html" class="back-link">← トップへ戻る</a>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="switchLang('ja',this)">JP</button>
      <button class="lang-btn" onclick="switchLang('en',this)">EN</button>
      <button class="lang-btn" onclick="switchLang('zh',this)">中</button>
      <button class="lang-btn" onclick="switchLang('ko',this)">한</button>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="access-hero">
  <span class="hero-eyebrow">Kuwana Station → MY HOUSE たいみんぐ</span>
  <h1 class="hero-title" id="access-hero-title">桑名駅から<br><em>徒歩3分</em></h1>
  <p class="hero-sub" id="access-hero-sub">桑名駅東口を出てすぐ。わかりやすい一本道です。</p>
</section>

<!-- TAB SECTION -->
<section class="tab-section">
  <span class="section-label">Access Guide</span>
  <h2 class="section-title" id="tab-title">アクセス<em>ガイド</em></h2>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('map', this)" id="tab-btn-map">🗺️ &nbsp;Googleマップ</button>
    <button class="tab-btn" onclick="switchTab('route', this)" id="tab-btn-route">📸 &nbsp;桑名駅からの道順</button>
  </div>

  <!-- TAB 1: MAP -->
  <div class="tab-pane active" id="tab-map">
    <div class="map-wrap">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m28!1m12!1m3!1d3265.605573471525!2d136.6821622261687!3d35.066599113491776!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m13!3e6!4m5!1s0x60039a8e4f16ef55%3A0x9e132a5c9c4bb1fe!2z5qGR5ZCN6aeF44CB44CSNTExLTA4MTEg5LiJ6YeN55yM5qGR5ZCN5biC5p2x5pa5IOW4guS5i-e4hA!3m2!1d35.0667593!2d136.6837289!4m5!1s0x60039b54b7487dab%3A0x428efb94dcb0ed06!2zTVkgSE9VU0Ug44Gf44GE44G_44KT44GQ44CB44CSNTExLTAwMDkg5LiJ6YeN55yM5qGR5ZCN5biC5qGR5ZCN77yU77yX77yW4oiS77yV77yS!3m2!1d35.0661023!2d136.6855687!5e0!3m2!1sja!2sjp!4v1776899936291!5m2!1sja!2sjp"
        allowfullscreen=""
        loading="lazy">
      </iframe>
    </div>
    <div class="map-info">
      <div class="map-item">
        <div class="map-icon">🚶</div>
        <div class="map-text">
          <strong id="walk-label">徒歩</strong>
          <span id="walk-time">約3分（約250m）</span>
        </div>
      </div>
      <div class="map-item">
        <div class="map-icon">📍</div>
        <div class="map-text">
          <strong id="addr-label">住所</strong>
          <span>三重県桑名市桑名 476-52</span>
        </div>
      </div>
      <div class="map-item">
        <div class="map-icon">🗺️</div>
        <div class="map-text">
          <strong id="gmap-label">Googleマップで開く</strong>
          <a href="https://maps.app.goo.gl/c5a7J1XYvBGn9uvX7" target="_blank" style="color:var(--accent);font-size:0.82rem;" id="gmap-link">ルートを確認する →</a>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB 2: PHOTO ROUTE GUIDE -->
  <div class="tab-pane" id="tab-route">
    <div class="route-guide">
      <img src="images/route_01.jpg" alt="道順①近鉄・JR出口" class="route-img">
      <img src="images/route_02.jpg" alt="道順②直進" class="route-img">
      <img src="images/route_03.jpg" alt="道順③階段を降りる" class="route-img">
      <img src="images/route_04.jpg" alt="道順④⑤左折・交番" class="route-img">
      <img src="images/route_05.jpg" alt="道順⑥⑦信号・直進" class="route-img">
      <img src="images/route_06.jpg" alt="道順⑧ローソン・到着" class="route-img">
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div style="display:flex;align-items:center;gap:0.8rem;">
    <img src="images/logo.png" alt="MY HOUSE たいみんぐ" style="height:32px;width:auto;">
    <span style="font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:white;line-height:1.3;">
      MY HOUSE たいみんぐ
      <small style="display:block;font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.12em;color:rgba(255,255,255,0.4);">Kuwana</small>
    </span>
  </div>
  <div class="footer-info">
    三重県桑名市桑名 476-52<br>
    桑名駅徒歩3分 | 最大12名 | バリアフリー<br>
    © 2025 MY HOUSE たいみんぐ
  </div>
</footer>

<script>
var translations = {
  ja: {
    "access-hero-title": "桑名駅から<br><em>徒歩3分</em>",
    "access-hero-sub": "桑名駅東口を出てすぐ。わかりやすい一本道です。",
    "map-label": "Route Map",
    "map-title": "Googleマップで<em>ルート確認</em>",
    "walk-label": "徒歩",
    "walk-time": "約3分（約250m）",
    "addr-label": "住所",
    "gmap-label": "Googleマップで開く",
    "gmap-link": "ルートを確認する →",
    "route-label": "Photo Guide",
    "route-title": "写真で見る<em>道順</em>"
  },
  en: {
    "access-hero-title": "3 min walk<br><em>from Kuwana Sta.</em>",
    "access-hero-sub": "Exit from the east exit of Kuwana Station. Easy, straight route.",
    "map-label": "Route Map",
    "map-title": "Check Route on<em>Google Maps</em>",
    "walk-label": "Walking",
    "walk-time": "Approx. 3 min (250m)",
    "addr-label": "Address",
    "gmap-label": "Open in Google Maps",
    "gmap-link": "View route →",
    "route-label": "Photo Guide",
    "route-title": "Step-by-step<em>Photo Guide</em>"
  },
  zh: {
    "access-hero-title": "距桑名站<br><em>步行3分钟</em>",
    "access-hero-sub": "从桑名站东口出来即是。简单直接的路线。",
    "map-label": "路线地图",
    "map-title": "在Google地图<em>确认路线</em>",
    "walk-label": "步行",
    "walk-time": "约3分钟（约250m）",
    "addr-label": "地址",
    "gmap-label": "在Google地图中打开",
    "gmap-link": "查看路线 →",
    "route-label": "照片导览",
    "route-title": "照片<em>路线指南</em>"
  },
  ko: {
    "access-hero-title": "쿠와나역에서<br><em>도보 3분</em>",
    "access-hero-sub": "쿠와나역 동쪽 출구에서 바로. 간단한 직선 경로입니다.",
    "map-label": "경로 지도",
    "map-title": "Google 지도로<em>경로 확인</em>",
    "walk-label": "도보",
    "walk-time": "약 3분（약 250m）",
    "addr-label": "주소",
    "gmap-label": "Google 지도에서 열기",
    "gmap-link": "경로 확인하기 →",
    "route-label": "사진 가이드",
    "route-title": "사진으로 보는<em>길 안내</em>"
  }
};

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function switchLang(lang, btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  var t = translations[lang];
  if (!t) return;
  Object.keys(t).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = t[id];
  });
}
</script>

</body>
</html>
